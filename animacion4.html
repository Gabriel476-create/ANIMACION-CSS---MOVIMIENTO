<html>
<head>
    <Title>ANIMACION 3 CSS</Title>
    <style>
        *{
            padding:0px;
            margin:0px;            
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px  solid black;
            background-color: black;
            position: relative;/* para centrar el div */
            margin: 0 auto ;/* para centrar el div */
            overflow: hidden;/* muestra solo lo interior */
        }
        .cuadrito{
            width: 100px;
            height: 100px;
            /* background-color: red; */
            position: absolute;/* permite mover div dentro del contenedor */
            top: 50px;/* de arriba hacia abajo "top"
        de izquierda a derecha "left" */
            left: -50px;
            animation: cuadrito 5s infinite linear;
        }
        @keyframes cuadrito{
            from{
                 left: -100px; 
            }
            to{
                 left: 500px; 
            }
        }
        .cuadrito img{
            width: 100px;
            height: 100px;
            top: 0px;
            left: 0px;
            animation: cuadritoimg 1s infinite alternate;

        }
        @keyframes cuadritoimg{
            from{
                rotate: -10deg;
            }
            to{
                rotate: 20deg;
            }
        }
        .cuadrito1{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 10px;
            animation: cuadrito 2s -0.5s infinite linear;
        }
        .cuadrito2{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 30px;
            animation: cuadrito 4s -1s infinite linear;
        }
        .cuadrito3{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 55px;
            animation: cuadrito 3s -2s infinite linear;
        }
        .cuadrito4{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 80px;
            animation: cuadrito 3s -1s infinite linear;
        }
        .cuadrito5{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 100px;
            animation: cuadrito 5s -3.5s infinite linear;
        }
        .cuadrito6{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 120px;
            animation: cuadrito 2s -0.5s infinite linear;
        }
        .cuadrito7{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 145px;
            animation: cuadrito 4s -2s infinite linear;
        }
        .cuadrito8{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 165px;
            animation: cuadrito 2s -1S infinite linear;
        }
        .cuadrito9{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 185px;
            animation: cuadrito 5s -3s infinite linear;
        }
        .cuadrito10{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute;
            top: 45px;
            animation: cuadrito 2s -2s infinite linear;
        }

        </style>
</head>
<body>
    <div class="contenedor">
        <div class="cuadrito">
            <img src="img/img3.gif">
        </div>
        <div class="cuadrito1"></div>
        <div class="cuadrito2"></div>
        <div class="cuadrito3"></div>
        <div class="cuadrito4"></div>
        <div class="cuadrito5"></div>
        <div class="cuadrito6"></div>
        <div class="cuadrito7"></div>
        <div class="cuadrito8"></div>
        <div class="cuadrito9"></div>
        <div class="cuadrito10"></div>
    </div>
</body>
</html>
